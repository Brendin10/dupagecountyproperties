<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandland</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body>
  <div id="app">
    <header class="hud hidden" id="hud">
      <div class="hud-brand">BANDLAND</div>
      <div class="hud-stats">
        <div class="stat-pill cash-pill">
          <span class="stat-icon">💵</span>
          <span id="hud-cash">0</span>
          <span class="stat-label">BandCash</span>
        </div>
        <div class="stat-pill star-pill">
          <span class="stat-icon">⭐</span>
          <span id="hud-stars">0</span>
          <span class="stat-label">Star Meter</span>
        </div>
      </div>
    </header>

    <main id="screen-root"></main>
  </div>

  <script src="js/instruments.js?v=4"></script>
  <script src="js/songs.js?v=4"></script>
  <script src="js/data.js?v=4"></script>
  <script src="js/characters.js?v=4"></script>
  <script src="js/wearables.js?v=4"></script>
  <script src="js/bandmates.js?v=4"></script>
  <script src="js/audio.js?v=4"></script>
  <script src="js/metronome.js?v=4"></script>
  <script src="js/rhythm-lane.js?v=4"></script>
  <script src="js/bandaudio.js?v=4"></script>
  <script src="js/venues.js?v=4"></script>
  <script src="js/save.js?v=4"></script>
  <script src="js/game.js?v=4"></script>
</body>
</html>
